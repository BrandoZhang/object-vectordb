name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project
        run: uv sync --all-extras --frozen

      - name: Ruff check
        run: uv run ruff check src tests benches

      - name: Ruff format check
        run: uv run ruff format --check src tests benches

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --all-extras --frozen --python ${{ matrix.python-version }}

      - name: Run pytest
        run: |
          # Collect coverage on the 3.11 matrix only — coverage merging across
          # Python versions is unreliable with pytest-cov, and three uploads to
          # Codecov for the same commit just clutters the dashboard.
          if [ "${{ matrix.python-version }}" = "3.11" ]; then
            uv run --python ${{ matrix.python-version }} pytest -q --durations=10 \
                --cov=src/object_vectordb --cov-report=xml --cov-report=term
          else
            uv run --python ${{ matrix.python-version }} pytest -q --durations=10
          fi

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11' && !cancelled()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false  # don't gate CI on Codecov flakes
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Build
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
