name: Version check

on:
  pull_request:
    branches: [main]

jobs:
  version-bumped:
    name: pyproject version bumped vs. main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history to diff against main

      - name: Detect production code changes
        id: scope
        run: |
          # Require a version bump only if production code changed.
          # Pure-docs / pure-CI / pure-test PRs are exempt.
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD \
              | grep -E '^(src/|pyproject\.toml$)' > /dev/null; then
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.scope.outputs.needs_bump == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Compare versions (PEP 440 ordering)
        if: steps.scope.outputs.needs_bump == 'true'
        run: |
          python -m pip install --quiet packaging
          python <<'PY'
          import subprocess, sys, tomllib
          from packaging.version import InvalidVersion, Version

          def read_version(text: str) -> str | None:
              data = tomllib.loads(text)
              return data.get("project", {}).get("version")

          def assert_valid(version: str) -> None:
              try:
                  Version(version)
              except InvalidVersion as exc:
                  print(f"::error::PR version {version!r} is not valid PEP 440: {exc}",
                        file=sys.stderr)
                  sys.exit(1)

          with open("pyproject.toml", "rb") as f:
              pr_version = read_version(f.read().decode())
          if pr_version is None:
              print("::error::pyproject.toml has no [project].version", file=sys.stderr)
              sys.exit(1)

          base = "origin/${{ github.base_ref }}"
          try:
              main_text = subprocess.check_output(
                  ["git", "show", f"{base}:pyproject.toml"],
                  text=True,
                  stderr=subprocess.DEVNULL,
              )
          except subprocess.CalledProcessError:
              # First-release scenario: main has no pyproject.toml yet. Any
              # valid PEP 440 version is acceptable as the initial version.
              assert_valid(pr_version)
              print(f"OK: no pyproject.toml on {base}; PR version {pr_version} accepted "
                    "as the initial version.")
              sys.exit(0)

          main_version = read_version(main_text)
          if main_version is None:
              # main has a pyproject.toml but no [project].version field —
              # same handling as the first-release scenario.
              assert_valid(pr_version)
              print(f"OK: no [project].version on {base}; PR version {pr_version} "
                    "accepted as the initial version.")
              sys.exit(0)

          print(f"PR version:   {pr_version}")
          print(f"main version: {main_version}")

          if Version(pr_version) <= Version(main_version):
              print(
                  f"::error::Version in pyproject.toml must be bumped from "
                  f"{main_version} (currently {pr_version}).",
                  file=sys.stderr,
              )
              print(
                  "::error::SemVer 2.0: bump PATCH for fixes, MINOR for "
                  "non-breaking features, MAJOR for breaking changes.",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"OK: {pr_version} > {main_version}")
          PY
